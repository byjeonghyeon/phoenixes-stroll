<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,
body{

margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#F8F7F3;

display:flex;
justify-content:center;
align-items:center;

}

video{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

object-fit:contain;

z-index:1;

opacity:0;

animation:fade 1s forwards;

}

@keyframes fade{

from{

opacity:0;

}

to{

opacity:1;

}

}

#guide{

position:fixed;

left:50%;
bottom:28px;

transform:translateX(-50%);

padding:10px 18px;

background:rgba(255,255,255,.82);

border-radius:999px;

font-size:14px;

color:#666;

font-family:-apple-system,BlinkMacSystemFont,Pretendard,sans-serif;

z-index:9999;

box-shadow:0 6px 20px rgba(0,0,0,.08);

transition:opacity .5s;

white-space:nowrap;

}

.hide{

opacity:0;

pointer-events:none;

}

</style>

</head>

<body>

<video
id="video"
autoplay
muted
loop
playsinline>

<source src="phoenixes-stroll.mp4" type="video/mp4">

</video>

<div id="guide">

🎵 화면을 한 번 터치하면 음악이 시작됩니다.

</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let started=false;

function enableAudio(){

if(started) return;

started=true;

guide.classList.add("hide");

video.muted=false;

video.volume=0;

video.play();

let v=0;

const timer=setInterval(()=>{

v+=0.05;

if(v>=1){

v=1;

clearInterval(timer);

}

video.volume=v;

},50);

}

document.addEventListener("click",enableAudio);

document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
