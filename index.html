<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
}

/* 영상이 다른 요소를 가리지 않도록 z-index 최하위 고정 */
video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:0;
    z-index: 1; 
    animation:fadeVideo 0.9s ease forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

/* 안내문이 영상 위로 확실히 올라오도록 z-index를 올리고 고정 */
#guide{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    font-size:12px;
    letter-spacing:.03em;
    color:#767676; /* 중명도 회색 */
    opacity:0;
    transition:opacity 1.2s ease;
    white-space:nowrap;
    user-select:none;
    pointer-events:none;
    z-index:100; /* video(1)보다 확실히 위에 위치 */
}

.show{
    opacity:1 !important; /* 가시성 강제 보장 */
}

/* 시그니처 텍스트도 영상 위로 올림 */
#signature{
    position:fixed;
    right:20px;
    bottom:18px;
    font-size:10px;
    color:rgba(90,90,90,.45);
    letter-spacing:.08em;
    user-select:none;
    z-index:100; /* video(1)보다 확실히 위에 위치 */
}

</style>

</head>

<body>

<video
id="video"
autoplay
muted
loop
playsinline
webkit-playsinline>

<source src="phoenixes-stroll.mp4" type="video/mp4">

</video>

<div id="guide">
♪ 화면을 터치해 음악과 함께 감상해 보세요.
</div>

<div id="signature">
Jeonghyeon
</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

// 영상 시작 후 2초 뒤 안내문 표시
setTimeout(()=>{
    if(!activated){
        guide.classList.add("show");
    }
},2000);

// 7초 뒤 안내문 숨김
setTimeout(()=>{
    guide.classList.remove("show");
},7000);

function enableAudio(){
    if(activated) return;
    activated=true;
    
    guide.classList.remove("show");
    video.muted=false;
    video.volume=0;
    video.play();

    let volume=0;
    const fade=setInterval(()=>{
        volume+=0.05;
        if(volume>=1){
            volume=1;
            clearInterval(fade);
        }
        video.volume=volume;
    },50);
}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
