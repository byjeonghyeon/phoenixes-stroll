<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
}

#video-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:0;
    z-index: 1;
    animation:fadeVideo 0.9s ease forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

/* 텍스트 레이아웃 구조 변경:
   안내문은 정중앙을 유지하고, 시그니처는 우측으로 치우치게 균형을 잡습니다.
*/
#text-overlay-bar {
    position: absolute;
    left: 0;
    bottom: 25px; /* 검은 띠 안에서의 높이 (원하는 대로 조절 가능) */
    width: 100%;
    display: grid;
    grid-template-columns: 1fr auto 1fr; /* 좌우 균등 여백을 만들어 중앙 정렬 보장 */
    align-items: center;
    z-index: 10;
    pointer-events: none;
}

/* 안내문 - 두 번째 열에 위치하여 항상 전체 화면의 완벽한 정중앙 고정 */
#guide{
    grid-column: 2;
    font-size:12px;
    letter-spacing:.03em;
    color: #4A4A4A; 
    opacity:0;
    transition:opacity 0.8s ease;
    white-space:nowrap;
    user-select:none;
}

#guide.show{
    opacity:1 !important;
}

/* 시그니처 - 세 번째 열 내부로 배치하여 안내문 우측 공간으로 밀어냄
   margin-left를 조절하여 원하는 만큼 오른쪽으로 치우치게 설정 가능
*/
#signature{
    grid-column: 3;
    justify-self: start; /* 세 번째 영역의 시작점에 배치 */
    margin-left: 60px;   /* 안내문으로부터 오른쪽으로 치우쳐지는 간격 (더 늘리려면 숫자 상향) */
    font-size:10px;
    color: rgba(74, 74, 74, 0.55); 
    letter-spacing:.08em;
    user-select:none;
}

</style>

</head>

<body>

<div id="video-wrapper">

    <video
    id="video"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline>
    <source src="phoenixes-stroll.mp4" type="video/mp4">
    </video>

    <div id="text-overlay-bar">
        <div></div> 
        
        <div id="guide">
        ♪ 화면을 터치해 음악과 함께 감상해 보세요.
        </div>
        
        <div id="signature">
        Jeonghyeon
        </div>
    </div>

</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

// 영상 시작 후 2.5초 뒤 안내문 표시
setTimeout(()=>{
    if(!activated){
        guide.classList.add("show");
    }
},2500);

// 8초 뒤 안내문 숨김
setTimeout(()=>{
    guide.classList.remove("show");
},8000);

function enableAudio(){
    if(activated) return;
    activated=true;
    
    guide.classList.remove("show");
    video.muted=false;
    video.volume=0;
    video.play();

    let volume=0;
    const fade=setInterval(()=>{
        volume+=0.05;
        if(volume>=1){
            volume=1;
            clearInterval(fade);
        }
        video.volume=volume;
    },50);
}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
