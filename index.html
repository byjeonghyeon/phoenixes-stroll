<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

video{

    width:100%;
    height:100%;

    object-fit:contain;

    opacity:0;

    animation:fadein .9s ease forwards;

}

@keyframes fadein{

from{
opacity:0;
}

to{
opacity:1;
}

}

#guide{

position:fixed;

bottom:28px;

left:50%;

transform:translateX(-50%);

padding:10px 18px;

background:rgba(255,255,255,.78);

border-radius:30px;

font-size:14px;

color:#666;

backdrop-filter:blur(6px);

transition:opacity .6s;

font-family:-apple-system,BlinkMacSystemFont,Pretendard,sans-serif;

}

.hide{

opacity:0;

pointer-events:none;

}

</style>

</head>

<body>

<video
id="video"
autoplay
muted
loop
playsinline
webkit-playsinline>

<source src="phoenixes-stroll.mp4" type="video/mp4">

</video>

<div id="guide">
♪ 화면을 한 번 터치하면 음악과 함께 감상하실 수 있습니다.
</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

function enableAudio(){

if(activated) return;

activated=true;

video.muted=false;

video.volume=0;

guide.classList.add("hide");

let v=0;

const fade=setInterval(()=>{

v+=0.05;

video.volume=v;

if(v>=1){

video.volume=1;

clearInterval(fade);

}

},50);

}

document.addEventListener("click",enableAudio);

document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
