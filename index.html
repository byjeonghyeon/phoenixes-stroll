<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

/* 전체 화면 배경 */
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3; /* 원래 배경색 유지 */
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
}

/* 비디오 영역 (컨테이너) */
#container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* 비디오 자체 */
video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain; /* 영상 비율 유지 */
    opacity:0;
    z-index: 1; /* 가장 아래 레이어 */
    animation:fadeVideo 0.9s ease forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

/* 안내문 - 밝은 색으로 변경 및 비디오 내부 위치 */
#guide{
    position:absolute;
    left:50%;
    bottom:12%; /* 하단 12% 지점에 위치 */
    transform:translateX(-50%);
    font-size:14px; /* 글씨 크기 약간 확대 */
    font-weight: 500;
    letter-spacing:.03em;
    
    /* 어두운 배경에서 잘 보이도록 밝은 아이보리색으로 변경 */
    color:#FDFCF5; 
    
    /* 글씨 주변에 은은한 어두운 그림자를 주어 가독성 확보 */
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    
    opacity:0;
    transition:opacity 0.8s ease; /* 페이드 시간 단축 */
    white-space:nowrap;
    user-select:none;
    pointer-events:none;
    z-index:100; /* video(1)보다 무조건 위에 위치 */
}

/* 안내문 나타날 때 */
#guide.show{
    opacity:1 !important;
}

/* 시그니처 텍스트 - 밝은 색으로 변경 및 우하단 고정 */
#signature{
    position:absolute;
    right:20px;
    bottom:18px;
    font-size:11px;
    
    /* 어두운 배경에서 잘 보이도록 밝은 회색으로 변경 */
    color:rgba(255,255,255,0.7); 
    
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    letter-spacing:.08em;
    user-select:none;
    z-index:100; /* video(1)보다 무조건 위에 위치 */
}

</style>

</head>

<body>

<div id="container">

<video
id="video"
autoplay
muted
loop
playsinline
webkit-playsinline>

<source src="phoenixes-stroll.mp4" type="video/mp4">

</video>

<div id="guide">
♪ 화면을 터치해 음악과 함께 감상해 보세요.
</div>

<div id="signature">
Jeonghyeon
</div>

</div> <script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

// 영상 시작 후 2.5초 뒤 안내문 표시
setTimeout(()=>{
    if(!activated){
        guide.classList.add("show");
    }
},2500);

// 8초 뒤 안내문 숨김
setTimeout(()=>{
    guide.classList.remove("show");
},8000);

function enableAudio(){
    if(activated) return;
    activated=true;
    
    guide.classList.remove("show");
    video.muted=false;
    video.volume=0;
    video.play();

    let volume=0;
    const fade=setInterval(()=>{
        volume+=0.05;
        if(volume>=1){
            volume=1;
            clearInterval(fade);
        }
        video.volume=volume;
    },50);
}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
