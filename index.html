<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
}

#video-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:0;
    z-index: 1;
    animation:fadeVideo 0.9s ease forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

/* 
   텍스트 바 자체를 화면 중앙에 배치합니다.
   너비를 100%로 채우지 않고 컨텐츠 크기에 맞춤으로써 화면 밖 탈출을 막습니다.
*/
#text-overlay-bar {
    position: absolute;
    left: 50%;
    transform: translateX(-50%); /* 화면 가로축 기준 완벽한 정중앙 고정 */
    bottom: 25px; 
    display: flex;
    flex-direction: row; /* 무조건 한 줄 유지 */
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
}

/* 안내문 */
#guide{
    font-size:12px;
    letter-spacing:.03em;
    color: #4A4A4A; 
    opacity:0;
    transition:opacity 0.8s ease;
    user-select:none;
}

#guide.show{
    opacity:1 !important;
}

/* 시그니처 - 한 줄 안에서 안내문 오른쪽에 30px 간격을 두고 안착 */
#signature{
    margin-left: 30px;   
    font-size:10px;
    color: rgba(74, 74, 74, 0.55); 
    letter-spacing:.08em;
    user-select:none;
}

</style>

</head>

<body>

<div id="video-wrapper">

    <video
    id="video"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline>
    <source src="phoenixes-stroll.mp4" type="video/mp4">
    </video>

    <div id="text-overlay-bar">
        <!-- 가로 한 줄로 나란히 배치 -->
        <div id="guide">
        ♪ 화면을 터치해 음악과 함께 감상해 보세요.
        </div>
        
        <div id="signature">
        Jeonghyeon
        </div>
    </div>

</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

// 영상 시작 후 2.5초 뒤 안내문 표시
setTimeout(()=>{
    if(!activated){
        guide.classList.add("show");
    }
},2500);

// 8초 뒤 안내문 숨김
setTimeout(()=>{
    guide.classList.remove("show");
},8000);

function enableAudio(){
    if(activated) return;
    activated=true;
    
    guide.classList.remove("show");
    video.muted=false;
    video.volume=0;
    video.play();

    let volume=0;
    const fade=setInterval(()=>{
        volume+=0.05;
        if(volume>=1){
            volume=1;
            clearInterval(fade);
        }
        video.volume=volume;
    },50);
}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
