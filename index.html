<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
}

/* 비디오와 텍스트를 하나로 묶는 절대적 기준점 */
#video-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain; /* 영상 비율 유지 및 검은 띠 생성 */
    opacity:0;
    z-index: 1;
    animation:fadeVideo 0.9s ease forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

/* 
   영상의 실제 하단(검은 띠 부분) 위에 텍스트를 띄우기 위한 박스
   비디오 레이어(z-index: 1)보다 무조건 위에 오도록 설정
*/
#text-overlay-bar {
    position: absolute;
    left: 0;
    bottom: 25px; /* 검은 띠 하단에서 약간 위로 띄움 (원하는 높이로 조절 가능) */
    width: 100%;
    display: flex;
    justify-content: center; /* 가로 정중앙 정렬 */
    align-items: center;
    z-index: 10; /* 비디오보다 위에 배치 */
    pointer-events: none;
}

/* 안내문 - 어두운 회색 */
#guide{
    font-size:12px;
    letter-spacing:.03em;
    color: #4A4A4A; 
    opacity:0;
    transition:opacity 0.8s ease;
    white-space:nowrap;
    user-select:none;
}

#guide.show{
    opacity:1 !important;
}

/* 
   시그니처 - 안내문 우측에 일정한 간격을 두고 자연스럽게 배치 
   절대 좌표(absolute)로 찢어놓지 않고 구조적으로 묶어 누락 방지
*/
#signature{
    margin-left: 25px; /* 안내문과의 간격 */
    font-size:10px;
    color: rgba(74, 74, 74, 0.55); 
    letter-spacing:.08em;
    user-select:none;
}

</style>

</head>

<body>

<div id="video-wrapper">

    <video
    id="video"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline>
    <source src="phoenixes-stroll.mp4" type="video/mp4">
    </video>

    <!-- 비디오의 contain 렝더링 영역을 덮는 상위 레이어 바 -->
    <div id="text-overlay-bar">
        <div id="guide">
        ♪ 화면을 터치해 음악과 함께 감상해 보세요.
        </div>
        <div id="signature">
        Jeonghyeon
        </div>
    </div>

</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

// 영상 시작 후 2.5초 뒤 안내문 표시
setTimeout(()=>{
    if(!activated){
        guide.classList.add("show");
    }
},2500);

// 8초 뒤 안내문 숨김
setTimeout(()=>{
    guide.classList.remove("show");
},8000);

function enableAudio(){
    if(activated) return;
    activated=true;
    
    guide.classList.remove("show");
    video.muted=false;
    video.volume=0;
    video.play();

    let volume=0;
    const fade=setInterval(()=>{
        volume+=0.05;
        if(volume>=1){
            volume=1;
            clearInterval(fade);
        }
        video.volume=volume;
    },50);
}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
