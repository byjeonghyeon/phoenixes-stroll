<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#F8F7F3;
    display:flex;
    flex-direction: column; /* 요소를 세로로 배치 */
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
}

/* 비디오가 화면 대부분을 차지하되, 하단 여백을 확보 */
#container {
    position: relative;
    width: 100%;
    flex: 1; /* 하단 텍스트 영역을 제외한 나머지 공간을 꽉 채움 */
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:0;
    z-index: 1;
    animation:fadeVideo 0.9s ease forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

/* 화면 맨 최하단에 텍스트들을 고정하는 영역 */
#bottom-bar {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 40px; /* 하단 영역 높이 */
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    z-index: 100;
    pointer-events: none;
}

/* 안내문 - 어두운 회색으로 변경 및 최하단 정중앙 배치 */
#guide{
    font-size:12px;
    letter-spacing:.03em;
    
    /* 눈에 잘 띄는 어두운 회색으로 변경 */
    color: #4A4A4A; 
    
    opacity:0;
    transition:opacity 0.8s ease;
    white-space:nowrap;
    user-select:none;
}

#guide.show{
    opacity:1 !important;
}

/* 시그니처 - 최하단 우측 끝에 확실하게 고정 */
#signature{
    position: absolute;
    right: 20px;
    font-size:10px;
    
    /* 은은하게 보이는 어두운 회색 */
    color: rgba(74, 74, 74, 0.55); 
    
    letter-spacing:.08em;
    user-select:none;
}

</style>

</head>

<body>

<div id="container">
    <video
    id="video"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline>
    <source src="phoenixes-stroll.mp4" type="video/mp4">
    </video>
</div>

<div id="bottom-bar">
    <div id="guide">
    ♪ 화면을 터치해 음악과 함께 감상해 보세요.
    </div>
    <div id="signature">
    Jeonghyeon
    </div>
</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

// 영상 시작 후 2.5초 뒤 안내문 표시
setTimeout(()=>{
    if(!activated){
        guide.classList.add("show");
    }
},2500);

// 8초 뒤 안내문 숨김
setTimeout(()=>{
    guide.classList.remove("show");
},8000);

function enableAudio(){
    if(activated) return;
    activated=true;
    
    guide.classList.remove("show");
    video.muted=false;
    video.volume=0;
    video.play();

    let volume=0;
    const fade=setInterval(()=>{
        volume+=0.05;
        if(volume>=1){
            volume=1;
            clearInterval(fade);
        }
        video.volume=volume;
    },50);
}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
