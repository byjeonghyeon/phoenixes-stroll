<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>봉황들의 산책</title>

<style>

html,body{

margin:0;
width:100%;
height:100%;

background:#F8F7F3;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:
-apple-system,
BlinkMacSystemFont,
"Pretendard",
sans-serif;

}

video{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

object-fit:contain;

z-index:1;

opacity:0;

animation:fade 1s forwards;

}

@keyframes fade{

from{opacity:0;}

to{opacity:1;}

}


/* 작품명 */

#title{

position:fixed;

top:28px;

left:50%;

transform:translateX(-50%);

z-index:9999;

font-size:20px;

font-weight:500;

letter-spacing:.08em;

color:#555;

}


/* 음악 안내 */

#guide{

position:fixed;

bottom:14px;

left:50%;

transform:translateX(-50%);

padding:6px 12px;

border-radius:999px;

background:rgba(255,255,255,.78);

backdrop-filter:blur(6px);

font-size:9px;

letter-spacing:.03em;

color:#777;

box-shadow:0 4px 12px rgba(0,0,0,.08);

z-index:9999;

transition:opacity .6s;

white-space:nowrap;

}

.hide{

opacity:0;

pointer-events:none;

}

</style>

</head>

<body>

<div id="title">

봉황들의 산책

</div>

<video
id="video"
autoplay
muted
loop
playsinline>

<source src="phoenixes-stroll.mp4" type="video/mp4">

</video>

<div id="guide">

♪ 화면을 터치하면 음악이 시작됩니다.

</div>

<script>

const video=document.getElementById("video");
const guide=document.getElementById("guide");

let activated=false;

function enableAudio(){

if(activated) return;

activated=true;

guide.classList.add("hide");

video.muted=false;

video.volume=0;

video.play();

let volume=0;

const fade=setInterval(()=>{

volume+=0.05;

if(volume>=1){

volume=1;

clearInterval(fade);

}

video.volume=volume;

},50);

}

document.addEventListener("click",enableAudio);
document.addEventListener("touchstart",enableAudio,{passive:true});

</script>

</body>

</html>
