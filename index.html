<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>봉황들의 산책</title>

<style>

html,body{

    margin:0;
    width:100%;
    height:100%;

    background:#F8F7F3;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}

#container{

    position:relative;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

}

video{

    width:100%;
    height:100%;

    object-fit:contain;

    opacity:0;

    animation:fadeIn 1.0s ease forwards;

}

@keyframes fadeIn{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}

#touchMessage{

    position:absolute;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

    padding:10px 18px;

    border-radius:30px;

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(6px);

    color:#666;

    font-size:14px;

    letter-spacing:.02em;

    transition:opacity .6s;

    user-select:none;

}

.hidden{

    opacity:0;

    pointer-events:none;

}

</style>

</head>

<body>

<div id="container">

<video
id="artVideo"
autoplay
muted
loop
playsinline
webkit-playsinline>

<source src="phoenixes-stroll.mp4" type="video/mp4">

</video>

<div id="touchMessage">

♪ 화면을 한 번 터치하면 음악이 시작됩니다.

</div>

</div>

<script>

const video=document.getElementById("artVideo");
const message=document.getElementById("touchMessage");

let activated=false;

function enableSound(){

    if(activated) return;

    activated=true;

    video.muted=false;

    video.volume=0;

    video.play();

    message.classList.add("hidden");

    let volume=0;

    const fade=setInterval(()=>{

        volume+=0.05;

        if(volume>=1){

            volume=1;

            clearInterval(fade);

        }

        video.volume=volume;

    },50);

}

document.body.addEventListener("click",enableSound);
document.body.addEventListener("touchstart",enableSound);

</script>

</body>

</html>
